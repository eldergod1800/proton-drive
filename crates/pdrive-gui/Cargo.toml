[package]
name = "pdrive-gui"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "pdrive"
path = "src/main.rs"

[dependencies]
pdrive-core = { path = "../pdrive-core" }
cxx-qt = "0.8"
cxx-qt-lib = { version = "0.8", features = ["qt_gui", "qt_qml"] }
tokio = { version = "1", features = ["full"] }
zbus = { version = "4", features = ["tokio"] }
anyhow = "1"
tracing = "0.1"
tracing-subscriber = "0.3"

[build-dependencies]
cxx-qt-build = "0.8"
