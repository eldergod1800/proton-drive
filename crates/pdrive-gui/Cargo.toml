[package]
name = "pdrive-gui"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "pdrive"
path = "src/main.rs"

[build-dependencies]
cxx-qt-build = "0.8"

[dependencies]
pdrive-core = { path = "../pdrive-core" }
cxx-qt = "0.8"
cxx-qt-lib = { version = "0.8", features = ["qt_gui", "qt_qml"] }
tokio = { workspace = true }
zbus = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
